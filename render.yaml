services:
  - type: web
    name: impact-match-api
    env: node
    plan: free
    buildCommand: cd src/backend && npm install
    startCommand: cd src/backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://impact-match.vercel.app
